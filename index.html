<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مصاريف البيت</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Tahoma,Geneva,sans-serif;
  background:#f0f4f8;
  color:#1a1a2e;
  min-height:100vh;
  direction:rtl;
}
.app{max-width:430px;margin:0 auto;padding-bottom:40px}

/* Header */
.header{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
  color:#fff;
  padding:20px 16px 16px;
  text-align:center;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.header h1{font-size:20px;font-weight:700;letter-spacing:0.5px}
.header p{font-size:12px;opacity:0.7;margin-top:3px}

/* Tabs */
.tabs{
  display:flex;
  background:#fff;
  border-bottom:1px solid #e2e8f0;
  position:sticky;top:70px;z-index:99;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}
.tab{
  flex:1;padding:12px 4px;text-align:center;font-size:13px;
  cursor:pointer;border-bottom:3px solid transparent;
  color:#64748b;font-weight:500;transition:all .2s;
}
.tab.active{color:#1a1a2e;border-bottom-color:#e94560;font-weight:700}

/* Content */
.section{display:none;padding:14px 12px}
.section.active{display:block}

/* Month selector */
.month-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border-radius:12px;padding:10px 14px;
  margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,0.08);
}
.month-bar button{
  background:#f0f4f8;border:none;border-radius:8px;
  width:34px;height:34px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#1a1a2e;transition:background .15s;
}
.month-bar button:active{background:#e2e8f0}
.month-label{font-size:16px;font-weight:700;color:#1a1a2e}

/* Alert */
.alert{
  background:#fff3cd;border:1px solid #ffc107;border-radius:10px;
  padding:10px 12px;font-size:13px;color:#856404;
  margin-bottom:12px;display:none;
}

/* Category rows */
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-row{
  background:#fff;border-radius:12px;padding:12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.cat-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:14px;font-weight:600;color:#1a1a2e}
.badge{
  display:inline-block;font-size:10px;padding:2px 8px;
  border-radius:20px;margin-top:3px;font-weight:600;
}
.b-ess{background:#dcfce7;color:#16a34a}
.b-opt{background:#fef3c7;color:#d97706}
.inp-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.inp-wrap input{
  width:95px;text-align:left;padding:8px 8px;
  border:1.5px solid #e2e8f0;border-radius:8px;
  font-size:14px;background:#f8fafc;color:#1a1a2e;
  transition:border .15s;
}
.inp-wrap input:focus{outline:none;border-color:#e94560;background:#fff}
.inp-wrap span{font-size:11px;color:#64748b;white-space:nowrap}

/* Special rows */
.special-row{
  background:#fff;border-radius:12px;padding:12px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
  margin-top:8px;
}
.special-row.income{border-right:4px solid #16a34a}
.special-row.emergency{border-right:4px solid #e94560}
.special-row .sr-info{flex:1}
.special-row .sr-name{font-size:14px;font-weight:600;color:#1a1a2e}
.special-row .sr-desc{font-size:11px;color:#64748b;margin-top:2px}

/* Save button */
.save-btn{
  width:100%;margin-top:14px;padding:14px;
  background:linear-gradient(135deg,#e94560,#c0392b);
  color:#fff;border:none;border-radius:12px;
  font-size:16px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 12px rgba(233,69,96,0.4);
  transition:transform .1s;
}
.save-btn:active{transform:scale(0.98)}
.save-tag{text-align:center;margin-top:8px;font-size:13px;color:#16a34a;font-weight:600;min-height:20px}

/* Summary */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{
  background:#fff;border-radius:12px;padding:12px;
  text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.sum-card .lbl{font-size:11px;color:#64748b;margin-bottom:4px}
.sum-card .val{font-size:18px;font-weight:700;color:#1a1a2e}
.sum-card .val.red{color:#dc2626}
.sum-card .val.green{color:#16a34a}
.sum-card .sub{font-size:10px;color:#94a3b8;margin-top:2px}

.dist-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:10px}
.dist-row{margin-bottom:10px}
.dist-header{display:flex;justify-content:space-between;font-size:12px;color:#64748b;margin-bottom:4px}
.dist-bar-bg{height:7px;background:#f0f4f8;border-radius:4px;overflow:hidden}
.dist-bar{height:100%;border-radius:4px;transition:width .4s}

/* Compare */
.m-pickers{display:flex;gap:8px;margin-bottom:14px}
.m-pickers select{
  flex:1;padding:10px;border:1.5px solid #e2e8f0;
  border-radius:10px;font-size:13px;background:#fff;
  color:#1a1a2e;font-weight:500;
}
.compare-card{
  background:#fff;border-radius:12px;padding:12px;
  margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.cmp-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cmp-name{flex:1;font-size:13px;font-weight:600;color:#1a1a2e}
.cmp-diff{font-size:12px;font-weight:700}
.bar-row{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.bar-val{font-size:11px;color:#64748b;width:65px;text-align:left;flex-shrink:0}
.bar-track{flex:1;height:7px;background:#f0f4f8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.b1{background:#3b82f6}
.b2{background:#10b981}
.legend{display:flex;gap:14px;font-size:11px;color:#64748b;margin-top:6px}
.leg-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-left:4px;vertical-align:middle}

.total-compare{
  background:#fff;border-radius:12px;padding:14px;
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);margin-top:4px;
}
.no-data{
  text-align:center;padding:40px 20px;color:#94a3b8;font-size:14px;
  background:#fff;border-radius:12px;
}

/* Legend box */
.legend-box{
  display:flex;gap:14px;font-size:11px;color:#64748b;
  margin-top:8px;padding:8px 12px;background:#fff;
  border-radius:8px;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>🏠 مصاريف البيت</h1>
    <p>تتبع ومقارنة مصاريفك الشهرية</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('entry')">📝 إدخال</div>
    <div class="tab" onclick="switchTab('summary')">📊 ملخص</div>
    <div class="tab" onclick="switchTab('compare')">⚖️ مقارنة</div>
  </div>

  <!-- ENTRY TAB -->
  <div id="tab-entry" class="section active">
    <div class="month-bar">
      <button onclick="changeMonth(-1)">&#8250;</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">&#8249;</button>
    </div>
    <div class="alert" id="alert-msg">⚠️ تجاوزت الميزانية! المصاريف أكثر من الدخل.</div>
    <div class="cat-list" id="cat-list"></div>

    <div class="special-row income" style="margin-top:14px">
      <span style="font-size:24px">💰</span>
      <div class="sr-info">
        <div class="sr-name">الدخل الشهري</div>
        <div class="sr-desc">مجموع دخلك هذا الشهر</div>
      </div>
      <div class="inp-wrap">
        <input type="number" id="inp-income" placeholder="0" min="0">
        <span>د.ع</span>
      </div>
    </div>

    <div class="special-row emergency">
      <span style="font-size:24px">🚨</span>
      <div class="sr-info">
        <div class="sr-name">احتياطي الطوارئ</div>
        <div class="sr-desc">مبلغ جانب للأمور الطارئة</div>
      </div>
      <div class="inp-wrap">
        <input type="number" id="inp-emergency" placeholder="0" min="0">
        <span>د.ع</span>
      </div>
    </div>

    <button class="save-btn" onclick="saveMonth()">💾 حفظ البيانات</button>
    <div class="save-tag" id="save-tag"></div>
  </div>

  <!-- SUMMARY TAB -->
  <div id="tab-summary" class="section">
    <div class="month-bar">
      <button onclick="changeMonthS(-1)">&#8250;</button>
      <span class="month-label" id="month-label-s"></span>
      <button onclick="changeMonthS(1)">&#8249;</button>
    </div>
    <div id="summary-content"></div>
  </div>

  <!-- COMPARE TAB -->
  <div id="tab-compare" class="section">
    <div class="m-pickers">
      <select id="m1-sel" onchange="renderCompare()">
        <option value="">الشهر الأول</option>
      </select>
      <select id="m2-sel" onchange="renderCompare()">
        <option value="">الشهر الثاني</option>
      </select>
    </div>
    <div id="compare-content"></div>
  </div>

</div>

<script>
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const CATS = [
  {id:'meat',    name:'اللحوم',           icon:'🥩', ess:true},
  {id:'chicken', name:'الدجاج',           icon:'🍗', ess:true},
  {id:'veg',     name:'الخضار والفواكه',  icon:'🥦', ess:true},
  {id:'grocery', name:'الغذائية',         icon:'🛒', ess:true},
  {id:'electric',name:'الكهرباء',         icon:'⚡', ess:true},
  {id:'water',   name:'الماء',            icon:'💧', ess:true},
  {id:'internet',name:'الانترنيت',        icon:'📡', ess:false},
  {id:'mobile',  name:'رصيد الموبايل',   icon:'📱', ess:false},
  {id:'satellite',name:'اشتراك الستلايت',icon:'📺', ess:false},
];

const now = new Date();
let curY = now.getFullYear(), curM = now.getMonth();
let curYS = curY, curMS = curM;

function mKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function mLabel(y,m){ return MONTHS[m]+' '+y; }
function loadAll(){ try{ return JSON.parse(localStorage.getItem('home_exp')||'{}'); }catch(e){ return {}; } }
function saveAll(d){ localStorage.setItem('home_exp', JSON.stringify(d)); }
function loadM(y,m){ return loadAll()[mKey(y,m)]||{}; }
function fmt(n){ return Math.round(n||0).toLocaleString('ar-IQ'); }

/* ---- ENTRY ---- */
function renderEntry(){
  document.getElementById('month-label').textContent = mLabel(curY,curM);
  const saved = loadM(curY,curM);
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATS.forEach(c=>{
    const v = saved[c.id]||'';
    list.innerHTML += `<div class="cat-row">
      <div class="cat-icon">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <span class="badge ${c.ess?'b-ess':'b-opt'}">${c.ess?'أساسي':'يمكن الاستغناء'}</span>
      </div>
      <div class="inp-wrap">
        <input type="number" id="i-${c.id}" value="${v}" placeholder="0" min="0">
        <span>د.ع</span>
      </div>
    </div>`;
  });
  document.getElementById('inp-income').value = saved.income||'';
  document.getElementById('inp-emergency').value = saved.emergency||'';
  document.getElementById('save-tag').textContent = '';
  document.getElementById('alert-msg').style.display = 'none';
}

function saveMonth(){
  const data={};
  CATS.forEach(c=>{ data[c.id]=parseFloat(document.getElementById('i-'+c.id).value)||0; });
  data.income = parseFloat(document.getElementById('inp-income').value)||0;
  data.emergency = parseFloat(document.getElementById('inp-emergency').value)||0;
  const all=loadAll(); all[mKey(curY,curM)]=data; saveAll(all);
  const total=CATS.reduce((s,c)=>s+(data[c.id]||0),0);
  document.getElementById('alert-msg').style.display =
    (data.income>0 && total>data.income) ? 'block':'none';
  document.getElementById('save-tag').textContent = '✓ تم الحفظ بنجاح';
  populatePickers();
  renderSummaryContent();
}

function changeMonth(d){
  curM+=d; if(curM<0){curM=11;curY--;} if(curM>11){curM=0;curY++;}
  renderEntry();
}

/* ---- SUMMARY ---- */
function renderSummaryContent(){
  document.getElementById('month-label-s').textContent = mLabel(curYS,curMS);
  const s=loadM(curYS,curMS);
  const total=CATS.reduce((a,c)=>a+(s[c.id]||0),0);
  const ess=CATS.filter(c=>c.ess).reduce((a,c)=>a+(s[c.id]||0),0);
  const opt=CATS.filter(c=>!c.ess).reduce((a,c)=>a+(s[c.id]||0),0);
  const income=s.income||0, em=s.emergency||0;
  const remaining=income-total-em;
  const out=document.getElementById('summary-content');
  if(!total&&!income){ out.innerHTML='<div class="no-data">لا توجد بيانات لهذا الشهر<br><small>ادخل البيانات من تبويب الإدخال</small></div>'; return; }
  let bars='';
  CATS.forEach(c=>{
    const v=s[c.id]||0; if(!v) return;
    const pct=total>0?Math.round(v/total*100):0;
    bars+=`<div class="dist-row">
      <div class="dist-header"><span>${c.icon} ${c.name}</span><span>${fmt(v)} (${pct}%)</span></div>
      <div class="dist-bar-bg"><div class="dist-bar" style="width:${pct}%;background:${c.ess?'#3b82f6':'#f59e0b'}"></div></div>
    </div>`;
  });
  out.innerHTML=`
  <div class="sum-grid">
    <div class="sum-card"><div class="lbl">إجمالي المصاريف</div><div class="val ${total>income&&income>0?'red':''}">${fmt(total)}</div><div class="sub">دينار عراقي</div></div>
    <div class="sum-card"><div class="lbl">الدخل الشهري</div><div class="val">${fmt(income)}</div><div class="sub">دينار عراقي</div></div>
    <div class="sum-card"><div class="lbl">المصاريف الأساسية</div><div class="val">${fmt(ess)}</div><div class="sub">لا يمكن الاستغناء</div></div>
    <div class="sum-card"><div class="lbl">الكماليات</div><div class="val">${fmt(opt)}</div><div class="sub">يمكن الاستغناء</div></div>
    <div class="sum-card"><div class="lbl">احتياطي الطوارئ</div><div class="val">${fmt(em)}</div><div class="sub">محجوز</div></div>
    <div class="sum-card"><div class="lbl">المتبقي</div><div class="val ${remaining<0?'red':'green'}">${fmt(remaining)}</div><div class="sub">${remaining<0?'عجز':'فائض'}</div></div>
  </div>
  ${total>0?`<div style="background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.07)">
    <div class="dist-title">توزيع المصاريف</div>
    ${bars}
    <div class="legend-box">
      <span><span class="leg-dot" style="background:#3b82f6"></span>أساسي</span>
      <span><span class="leg-dot" style="background:#f59e0b"></span>يمكن الاستغناء</span>
    </div>
  </div>`:''}`;
}

function changeMonthS(d){
  curMS+=d; if(curMS<0){curMS=11;curYS--;} if(curMS>11){curMS=0;curYS++;}
  renderSummaryContent();
}

/* ---- COMPARE ---- */
function getAvailMonths(){
  const all=loadAll();
  return Object.keys(all).filter(k=>Object.keys(all[k]).length>0).sort().reverse();
}

function populatePickers(){
  const months=getAvailMonths();
  ['m1-sel','m2-sel'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    const cur=sel.value;
    sel.innerHTML=`<option value="">${i===0?'الشهر الأول':'الشهر الثاني'}</option>`;
    months.forEach(k=>{
      const [y,m]=k.split('-');
      sel.innerHTML+=`<option value="${k}" ${cur===k?'selected':''}>${MONTHS[parseInt(m)-1]+' '+y}</option>`;
    });
  });
}

function renderCompare(){
  const m1=document.getElementById('m1-sel').value;
  const m2=document.getElementById('m2-sel').value;
  const out=document.getElementById('compare-content');
  if(!m1||!m2){out.innerHTML='<div class="no-data">اختر شهرين للمقارنة</div>';return;}
  const all=loadAll(), d1=all[m1]||{}, d2=all[m2]||{};
  const [y1,mo1]=m1.split('-'), [y2,mo2]=m2.split('-');
  const l1=MONTHS[parseInt(mo1)-1]+' '+y1, l2=MONTHS[parseInt(mo2)-1]+' '+y2;
  let html='';
  CATS.forEach(c=>{
    const v1=d1[c.id]||0, v2=d2[c.id]||0;
    if(!v1&&!v2) return;
    const mx=Math.max(v1,v2,1);
    const diff=v2-v1;
    const dc=diff>0?'#dc2626':diff<0?'#16a34a':'#64748b';
    const dt=diff===0?'لا تغيير':(diff>0?'+':'')+fmt(diff)+' د.ع';
    html+=`<div class="compare-card">
      <div class="cmp-header">
        <span style="font-size:20px">${c.icon}</span>
        <span class="cmp-name">${c.name}</span>
        <span class="cmp-diff" style="color:${dc}">${dt}</span>
      </div>
      <div class="bar-row">
        <div class="bar-val">${fmt(v1)}</div>
        <div class="bar-track"><div class="bar-fill b1" style="width:${Math.round(v1/mx*100)}%"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-val">${fmt(v2)}</div>
        <div class="bar-track"><div class="bar-fill b2" style="width:${Math.round(v2/mx*100)}%"></div></div>
      </div>
      <div class="legend">
        <span><span class="leg-dot" style="background:#3b82f6"></span>${l1}</span>
        <span><span class="leg-dot" style="background:#10b981"></span>${l2}</span>
      </div>
    </div>`;
  });
  const t1=CATS.reduce((s,c)=>s+(d1[c.id]||0),0);
  const t2=CATS.reduce((s,c)=>s+(d2[c.id]||0),0);
  const td=t2-t1;
  html+=`<div class="total-compare">
    <div>
      <div style="font-size:14px;font-weight:700;color:#1a1a2e">الإجمالي</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px">${l1}: ${fmt(t1)} د.ع</div>
      <div style="font-size:11px;color:#64748b">${l2}: ${fmt(t2)} د.ع</div>
    </div>
    <div style="font-size:18px;font-weight:700;color:${td>0?'#dc2626':td<0?'#16a34a':'#64748b'}">${td>=0?'+':''}${fmt(td)} د.ع</div>
  </div>`;
  out.innerHTML=html;
}

/* ---- TABS ---- */
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['entry','summary','compare'][i]===t);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='summary') renderSummaryContent();
  if(t==='compare'){ populatePickers(); renderCompare(); }
}

/* ---- INIT ---- */
renderEntry();
renderSummaryContent();
populatePickers();
</script>
</body>
</html>
